name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run compile
      - run: npm run check:notices
      - run: npm run test:unit
      - run: npm run test:smoke
      - run: npm run check:security
      - run: npm run package:vsix -- --pre-release --out vscodex-ci.vsix
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vscodex-ci
          path: vscodex-ci.vsix
          retention-days: 7

  app-server:
    strategy:
      fail-fast: false
      matrix:
        codex: ['0.144.4', latest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm install --global @openai/codex@${{ matrix.codex }}
      - run: npm run test:app-server

  extension-host:
    strategy:
      fail-fast: false
      matrix:
        vscode: ['1.104.0', stable]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: xvfb-run -a npm run test:extension-host
        env:
          CODEX_TEST_VSCODE_VERSION: ${{ matrix.vscode }}
